spring.application.name=ApiGatewayMS
server.port=9090
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.cloud.gateway.server.webflux.routes[0].id=employee-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://EMPLOYEEMS
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/employee/**

spring.cloud.gateway.server.webflux.routes[1].id=department-rote
spring.cloud.gateway.server.webflux.routes[1].uri=lb://DEPARTMENTMS
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/departments/**
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=DEBUG
